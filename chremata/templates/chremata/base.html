{% load static %}
<!doctype html>
<html lang="es-mx">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Archeion / Chremata{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'chremata/chremata.css' %}">
</head>
<body>
  <header class="site-header">
    <div>
      <a class="brand" href="{% url 'chremata_reporte_diario' %}">Archeion / Chremata</a>
      <p class="subtitle">Reportes locales protegidos</p>
    </div>
    <nav class="site-nav" aria-label="Navegación principal">
      <a href="{% url 'chremata_reporte_diario' %}">Reporte diario</a>
      <a href="{% url 'admin:index' %}">Admin</a>
      {% if user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="link-button">Logout</button>
        </form>
      {% endif %}
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
